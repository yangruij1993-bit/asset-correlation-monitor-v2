name: Deploy Backend to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # You need to replace 'your-hf-username' and 'your-space-name' below
          # But we will use a clever way: we'll push the 'backend' folder content to the root of the HF repo
        run: |
          # Configure Git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Clone the HF space to a temp folder
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/rhozero-div/asset-correlation-monitor hf_space
          
          # Copy everything from backend to the HF space root
          cp -r backend/* hf_space/
          cp backend/Dockerfile hf_space/
          
          # Commit and push
          cd hf_space
          git add .
          git commit -m "Auto-deploy backend from GitHub Actions" || echo "No changes to commit"
          git push https://user:$HF_TOKEN@huggingface.co/spaces/rhozero-div/asset-correlation-monitor main
